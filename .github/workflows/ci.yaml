name: ci

on:
  push:
    branches: [ main, release-* ]
    tags:
      'v*'
  pull_request:
    branches: [ main ]
permissions:
  contents: read
env:
    QT_VERSION: 6.10.2
jobs:
  # This is a super hacky way to get this into a place that can actually be
  # used by downstream jobs because YAML values don't allow shell
  # interpolation, only github expression interpolation
  run-info:
    name: Gather Run Info
    runs-on: ubuntu-latest
    outputs:
      sha8: ${{ steps.calc-info.outputs.sha8 }}
      isRelease: ${{ steps.calc-info.outputs.isRelease }}
      signMacRelease: ${{ steps.calc-info.outputs.signMacRelease }}
      signWinRelease: ${{ steps.calc-info.outputs.signWinRelease }}
    steps:
      - name: CheckRun Info
        env:
          MCERT: ${{secrets.APPLE_CERTIFICATE}}
          WCERT: ${{ secrets.WINDOWS_CERT }}
        id: calc-info
        run: |
          MSIGN="false"
          WSIGN="false"
          RELEASE="false"
          if [[ "$GITHUB_REF" == *"tags/v"* || "$GITHUB_REF" == *"refs/heads/release" ]]; then
              RELEASE="true"
              NAME="$GITHUB_REF_NAME"
          fi
          if [[ "$MCERT" != "" ]]; then
              MSIGN="true"
          fi
          if [[ "$WCERT" != "" ]]; then
              WSIGN="true"
          fi
          if [[ "$NAME" == "" ]]; then
              NAME="continuous"
          fi
          echo "signMacRelease=$MSIGN" >> $GITHUB_OUTPUT
          echo "signWinRelease=$WSIGN" >> $GITHUB_OUTPUT
          echo "sha8=$NAME" >> $GITHUB_OUTPUT
          echo "isRelease=$RELEASE" >> $GITHUB_OUTPUT

  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    needs: run-info
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "Linux"
            , os: ubuntu-24.04
            , QT_INST_DIR: /opt
            , extraCMakeConfig: "-DCMAKE_INSTALL_PREFIX=/usr"
          }
        - {
            name: "Mac"
            , os: macos-latest
            , QT_INST_DIR: /Users/runner
            , extraCMakeConfig: "-DCMAKE_OSX_ARCHITECTURES=\"arm64;x86_64\""
            , cmakeSigning: "-DNOTARIZE_AS=\"Joseph Rozner\""
            , buildTarget: "--target package"
          }
        - {
            name: "Windows"
            , os: windows-2025-vs2026
            , QT_INST_DIR: "C:/", QT_ARCH: win64_msvc2022_64
            , extraCMakeConfig: "-A x64"
            , buildTarget: "--target package"
          }
    steps:
    - name: Setup env
      shell: bash
      run: |
        echo "name=ashirt-${{ needs.run-info.outputs.sha8 }}" >> $GITHUB_ENV
        echo "githash=${{ needs.run-info.outputs.sha8 }}" >> $GITHUB_ENV
        echo "signMacRelease=${{ needs.run-info.outputs.signMacRelease }}" >> $GITHUB_ENV
        echo "signWinRelease=${{ needs.run-info.outputs.signWinRelease }}" >> $GITHUB_ENV

    - name: Check out code
      uses: actions/checkout@v7
      with:
        submodules: true
        fetch-depth: 0
    - run: git fetch --tags --force

    - name: Import Signing Certificate ( windows )
      if: runner.os == 'Windows' && env.signWinRelease == 'true'
      run: |
        New-Item -ItemType directory -Path build\certificate
        Set-Content -Path build\certificate\certificate.txt -Value '${{ secrets.WINDOWS_CERT }}'
        certutil -decode build\certificate\certificate.txt build\certificate\certificate.pfx

    - name: Import Signing Certificate ( macos )
      if: runner.os == 'macOS' && env.signMacRelease == 'true'
      uses: Apple-Actions/import-codesign-certs@v7
      with:
        p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
        p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

    - name: Install Qt
      uses: jurplel/install-qt-action@v4.3.1
      with:
       dir: ${{matrix.config.QT_INST_DIR}}
       arch: ${{ matrix.config.QT_ARCH }}
       version: ${{ env.QT_VERSION }}

    - name: Install Dependencies
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update > /dev/null && sudo apt-get install -qqq libx11-dev libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev libxcb-cursor0 > /dev/null
        elif [ "$RUNNER_OS" == "Windows" ]; then
            # Install the latest WiX toolset (the `wix` CLI) used by the
            # `package` target to build the MSI installer, plus the UI
            # extension that provides the license-acceptance wizard. WiX v7
            # gates commands behind the Open Source Maintenance Fee EULA
            # (error WIX7015); `-acceptEula wix7` accepts it non-interactively
            # (the actual build accepts it the same way in deploy/CMakeLists.txt).
            dotnet tool install --global wix
            wix extension add -g WixToolset.UI.wixext -acceptEula wix7
        fi

    - name: Build
      shell: bash
      run: |
        if [[ "${{ env.signMacRelease }}" == "true" ]]; then
            cmake -S. -Bbuild -DCMAKE_BUILD_TYPE=Release -DPACKAGE_VERSION="${{env.githash}}" ${{matrix.config.extraCMakeConfig}} ${{matrix.config.cmakeSigning}}
        else
            cmake -S. -Bbuild -DCMAKE_BUILD_TYPE=Release -DPACKAGE_VERSION="${{env.githash}}" ${{matrix.config.extraCMakeConfig}}
        fi
        cmake --build build --config Release ${{ matrix.config.buildTarget }}
        cd build
        mkdir -p dist
        if [ "$RUNNER_OS" == "Linux" ]; then
            wget -qc "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
            wget -qc "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
            chmod a+x linuxdeploy*.AppImage
            export VERSION=${{ env.githash }}
            export PATH=$PATH:/opt/Qt/${{env.QT_VERSION}}/gcc_64/libexec
            export LINUXDEPLOY_EXCLUDED_LIBRARIES="libqsqlmimer.so;libqsqloci.so"
            ./linuxdeploy-x86_64.AppImage --appdir=appdir  --output appimage \
                -e src/ashirt \
                -d ../deploy/ashirt.desktop \
                -i ../deploy/hicolor/128x128/apps/ashirt.png \
                --plugin=qt
        elif [[ "$RUNNER_OS" == "macOS" && "${{ env.signMacRelease }}" == "true" ]]; then
            # Prepare application for notarization
            xcrun notarytool store-credentials "AC_PASSWORD" --apple-id ${{ secrets.APPLE_ID }} --team-id ${{ secrets.APPLE_TEAM_ID }} --password ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
            # Notarize the application
            xcrun notarytool submit ${{env.name}}.dmg --keychain-profile "AC_PASSWORD" --wait
            # Staple the ticket to the application
            xcrun stapler staple ${{env.name}}.dmg
        elif [[ "$RUNNER_OS" == "Windows" && "${{ env.signWinRelease }}" == "true" ]]; then
            echo "not signing"
            #signtool sign -f certificate\\certificate.pfx -fd certHash -p '${{ secrets.WIN_CERT_PASS }}' -t http://timestamp.digicert.com ${{env.name}}.msi
        fi
        mv ashirt*.* dist/

    - name: Archive production artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{env.name}}-${{ matrix.config.os }}
        path: build/dist/ashirt*.*

  release:
    name: Release
    needs: [run-info, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Files
      uses: actions/download-artifact@v8

    - name: Deploy Continuous
      if: github.ref == 'refs/heads/main'
      uses: "marvinpinto/action-automatic-releases@latest"
      with:
       repo_token: "${{ secrets.GITHUB_TOKEN }}"
       automatic_release_tag: "continuous"
       prerelease: true
       title: "Continuous Build"
       files: ashirt-*/ashirt-*.*

    - name: Deploy Tag
      if: contains(github.ref, 'tags/v') || github.ref == 'refs/heads/release'
      uses: "marvinpinto/action-automatic-releases@latest"
      with:
       repo_token: "${{ secrets.GITHUB_TOKEN }}"
       automatic_release_tag: ${{ github.ref_name }}
       prerelease: false
       title: ${{ github.ref }}
       files: ashirt-*/ashirt-*.*
